name: CI - Validação

on:
  pull_request:
    branches: [main, develop]
  push:
    branches: [develop]

jobs:
  validate:
    name: Validar dados e lint
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Validar schema das palavras
        run: npm run validate

      - name: Build (verificar se compila)
        run: npm run build

      - name: Verificar se existem 365 palavras
        run: |
          count=$(find src/content/palavras -name "*.json" | wc -l)
          if [ $count -lt 365 ]; then
            echo "❌ Erro: Encontradas apenas $count palavras, esperado no mínimo 365"
            exit 1
          fi
          echo "✅ $count palavras encontradas"
